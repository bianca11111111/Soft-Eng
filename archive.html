<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Treasure Chest - Archive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="brand">
            <i class="fa-solid fa-gem treasure-icon"></i> 
            <span>CCS Treasure Chest</span>
        </div>
        <div class="user-info">
            <i class="fa-solid fa-circle-user profile-pic"></i>
            <span class="role-text">Student</span>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav>
                <a href="dashboard.html" class="nav-item">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-bag-shopping"></i> Archive
                </a>
                <a href="upload.html" class="nav-item">
                    <i class="fa-solid fa-upload"></i> Upload
                </a>
            </nav>
            <a href="login.html" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Log out
            </a>
        </aside>

        <main class="content-area">
            <div class="page-header">
                <h1>My Loot Bag</h1>
                <p>All Files in your Loot Bag</p>
                <hr class="header-line">
            </div>

            <div class="loot-container">
                <div class="action-bar">
                    <button class="btn btn-download">
                        <i class="fa-solid fa-download"></i> Download Selection
                    </button>
                    <button class="btn btn-rename">
                        <i class="fa-solid fa-pen"></i> Rename
                    </button>
                </div>

                <div class="file-display">
                    <h2 class="empty-msg">No Files Uploaded</h2>
                </div>
            </div>
        </main>
    </div>

    <script src="SE.js"></script>
</body>
</html>
