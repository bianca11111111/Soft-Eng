<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Archive - Student Archive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <div class="header-left">
            <img src="Archive" alt="CCS Logo" class="nav-logo">
            <span class="nav-title">CCS Archive</span>
        </div>
        <div class="profile-container">
            <div class="profile-circle-white">
                <i class="fa-solid fa-user user-icon-black"></i>
            </div>
            <span class="role-text-brown">Student</span>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li class="active"><a href="archive.html"><i class="fa-solid fa-box-archive"></i> Archive</a></li>
                    <li><a href="upload.html"><i class="fa-solid fa-upload"></i> Upload</a></li>
                </ul>
            </nav>
            <div class="logout-section">
                <a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Log out</a>
            </div>
        </aside>

        <main class="content">
            <div class="archive-main-wrapper">
                <div class="archive-title-header">
                    <h1>My Archive</h1>
                    <p>All Files in your Archive</p>
                </div>

                <div class="archive-actions-row">
                    <button class="archive-btn-orange"><i class="fa-solid fa-download"></i> Download Selection</button>
                    <button class="archive-btn-orange"><i class="fa-solid fa-pen"></i> Rename</button>
                </div>

                <div class="archive-display">
                    <div class="empty-state-box">No Files Uploaded</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Logout Modal Overlay -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-card">
            <div class="modal-icon">?</div>
            
            <h2>Confirm Logout</h2>
            <p>Are you sure you want to exit the application?</p>
            
            <div class="modal-buttons">
                <button class="btn-logout-anyway" onclick="logout()">Log Out Anyway</button>
                <button class="btn-cancel" onclick="closeLogoutModal()">Cancel</button>
            </div>
        </div>
    </div>


    <script src="SE.js"></script>
</body>
</html>
