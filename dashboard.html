<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Archive - Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="Archive" alt="CCS Archive " class="main-logo-img">
            <span class="brand-text">CCS Archive</span>
        </div>
        <div class="user-profile">
            <i class="fa-solid fa-circle-user profile-icon"></i>
            <span class="user-role">Student</span>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active"><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li><a href="archive.html"><i class="fa-solid fa-box-archive"></i> Archive</a></li>
                    <li><a href="upload.html"><i class="fa-solid fa-upload"></i> Upload</a></li>
                </ul>
            </nav>
            <div class="logout-section">
                <a href="#" onclick="showLogoutModal()"><i class="fa-solid fa-right-from-bracket"></i> Log out</a>
            </div>
        </aside>

        <main class="content dashboard-content">
            <div class="search-container">
                <div class="search-bar search-input-group">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search projects...">
                </div>
            </div>
            
            <section class="featured-section">
                <h2 class="featured-project-title">Featured Project</h2>
            </section>
        </main>
    </div>

    <!-- Logout Modal Overlay -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-card">
            <!-- Question Mark Icon -->
            <div class="modal-icon">?</div>
            
            <h2>Confirm Logout</h2>
            <p>Are you sure you want to exit the application?</p>
            
            <div class="modal-buttons">
                <button class="btn-logout-anyway" onclick="logout()">Log Out Anyway</button>
                <button class="btn-cancel" onclick="closeLogoutModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="SE.js"></script>
</body>
</html>
