<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Archive - Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="login-card">
            <div class="header">
                <div class="">
                    <div class="inner-cube"></div>
                </div>
                <h1 class="title">CCS ARCHIVE</h1>
            </div>

            <form action="#">
                <div class="fieldset">
                    <label class="field-label">Email Address/Student ID</label>
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="fieldset">
                    <label class="field-label">Enter your password</label>
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="submit" class="login-button">Log in</button>
            </form>

            <div class="footer-links">
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
        </div>
    </div>

     <script src="SE.js"></script>
</body>
</html>
