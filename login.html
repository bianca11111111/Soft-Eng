<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Treasure Chest Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">
        <div class="icon-container">
            <img src="https://via.placeholder.com/80?text=CCS" alt="CCS ARCHIVE">
        </div>

        <h1>CCS ARCHIVE</h1>
        <p class="subtitle">Please sign in to continue</p>

        <form id="loginForm" novalidate>
            <div class="input-group">
                <label for="username">Email Address/Student ID</label>
                <input id="username" name="username" type="text" placeholder="Username" autocomplete="username" required>
            </div>

            <div class="input-group">
                <label for="password">Enter your password</label>
                <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
            </div>

            <div class="checkbox-row">
                <label>
                    <input id="showPassword" type="checkbox" /> Show password
                </label>
                <label>
                    <input id="rememberMe" type="checkbox" /> Remember me
                </label>
            </div>

            <button type="submit" class="login-btn">Log in</button>

            <div id="message" aria-live="polite" style="margin-top:12px;font-size:0.95rem;color:#d32f2f;"></div>
        </form>

        <a href="#" class="forgot-link">Forgot Password?</a>
    </div>

    <script src="SE.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const showPasswordCheckbox = document.getElementById('showPassword');
        const rememberCheckbox = document.getElementById('rememberMe');

        const showMessage = (text, color = '#d32f2f') => {
            messageEl.style.color = color;
            messageEl.textContent = text;
            clearTimeout(showMessage.timeout);
            showMessage.timeout = setTimeout(() => {
                messageEl.textContent = '';
            }, 4500);
        };

        const loadRemembered = () => {
            const remembered = localStorage.getItem('ccs_remember_username');
            if (remembered) {
                usernameInput.value = remembered;
                rememberCheckbox.checked = true;
            }
        };

        const togglePasswordVisibility = () => {
            passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
        };

        showPasswordCheckbox.addEventListener('change', togglePasswordVisibility);

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            messageEl.textContent = '';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (username.length < 3) {
                showMessage('Please enter a valid username.', '#d32f2f');
                usernameInput.focus();
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', '#d32f2f');
                passwordInput.focus();
                return;
            }

            const validUser = username.toLowerCase() === 'student' && password === 'password123';

            if (validUser) {
                if (rememberCheckbox.checked) {
                    localStorage.setItem('ccs_remember_username', username);
                } else {
                    localStorage.removeItem('ccs_remember_username');
                }

                showMessage('Login successful! Redirecting...', '#2e7d32');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 900);
            } else {
                showMessage('Invalid credentials. Try again.', '#d32f2f');
                passwordInput.value = '';
                passwordInput.focus();
                shakeCard();
            }
        });

        loadRemembered();
        animateEntry();
    </script>

</body>
</html>
