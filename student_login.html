<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Archive - Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #cc8e69;">
    <div class="main-wrapper">
        <div class="login-card" style="background-color: #f5ebe0;">
            <div class="header">
                <div class="logo-hexagon">
                    <div class="inner-cube"></div>
                </div>
                <h1 class="title">CCS ARCHIVE</h1>
            </div>

            <form action="#">
                <div class="fieldset">
                    <label class="field-label">Student ID</label>
                    <input type="text" placeholder="Student ID" required>
                </div>

                <div class="fieldset">
                    <label class="field-label">Password</label>
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="submit" class="login-button">Log in</button>
            </form>

            <div class="footer-links">
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        const studentLoginForm = document.querySelector('.login-card form');
        if (studentLoginForm) {
            studentLoginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                window.location.href = 'dashboard.html';
            });
        }
    </script>
</body>
</html>
