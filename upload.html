<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Archive - Upload</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <div class="header-left">
            <img src="Archive" alt="CCS Logo" class="nav-logo">
            <span class="nav-title">CCS Archive</span>
        </div>
        <div class="profile-container">
            <div class="profile-circle-white">
                <i class="fa-solid fa-user user-icon-black"></i>
            </div>
            <span class="role-text-brown">Student</span>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li><a href="archive.html"><i class="fa-solid fa-box-archive"></i> Archive</a></li>
                    <li class="active"><a href="upload.html"><i class="fa-solid fa-upload"></i> Upload</a></li>
                </ul>
            </nav>
            <div class="logout-section">
                <a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Log out</a>
            </div>
        </aside>

        <main>
            <div class="content-box">
                <h2>Submission Upload</h2>
            </div>
            <div class="dashboard-content">
                <div class="upload-area">
                    <div class="upload-icon-mock"></div>
                    <p class="drag-text">Drag & Drop your Files here</p>
                    <button class="upload-btn">Upload Files</button>
                </div>

                <div class="empty-state-box">
                    No Upload Yet
                </div>
            </div>
        </main>
    </div>
    
    <!-- Logout Modal Overlay -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-card">
            <div class="modal-icon">?</div>
            
            <h2>Confirm Logout</h2>
            <p>Are you sure you want to exit the application?</p>
            
            <div class="modal-buttons">
                <button class="btn-logout-anyway" onclick="logout()">Log Out Anyway</button>
                <button class="btn-cancel" onclick="closeLogoutModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="SE.js"></script>
</body>
</html>
